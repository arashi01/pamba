name: Integration Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  CONFIGURATION: Release

jobs:
  analyse:
    name: Static Analysis
    runs-on: windows-2025
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore pamba.slnx

      - name: Format check
        run: dotnet format pamba.slnx --no-restore --verify-no-changes

      - name: Markdown lint
        run: dotnet build Pamba.Root.csproj --no-restore

  build:
    name: Build and Test
    runs-on: windows-2025
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore pamba-ci.slnf

      - name: Install Windows App SDK runtime
        shell: pwsh
        run: |
          $installer = Join-Path $env:RUNNER_TEMP 'WindowsAppRuntimeInstall.exe'
          Invoke-WebRequest -Uri 'https://aka.ms/windowsappsdk/1.8/latest/windowsappruntimeinstall-x64.exe' -OutFile $installer
          & $installer --quiet --force
          if ($LASTEXITCODE -ne 0) { throw "Windows App SDK runtime install failed: $LASTEXITCODE" }

      - name: Build
        run: >-
          dotnet build pamba-ci.slnf
          --no-restore
          --configuration ${{ env.CONFIGURATION }}
          -p:GeneratePackageOnBuild=false

      - name: Test
        run: >-
          dotnet test pamba-ci.slnf
          --no-build
          --configuration ${{ env.CONFIGURATION }}
          --logger "trx;LogFileName=results.trx"
          --collect "XPlat Code Coverage"
          --results-directory ./test-results

      - name: Pack
        run: >-
          dotnet pack pamba-ci.slnf
          --no-build
          --configuration ${{ env.CONFIGURATION }}
          --output ./packages

      - name: Upload packages
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: packages
          path: ./packages/**/*.*nupkg
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: ./test-results/**/*.trx
          retention-days: 7

      - name: Upload coverage information
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: ./test-results/**/coverage.cobertura.xml
          retention-days: 7

  publish:
    name: Publish Packages
    needs: [analyse, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: packages
          path: packages

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: >-
          dotnet nuget push "./packages/**/*.nupkg"
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push to GitHub Packages
        run: >-
          dotnet nuget push "./packages/**/*.nupkg"
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --source https://nuget.pkg.github.com/arashi01/index.json
          --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release create "${{ github.ref_name }}"
          packages/*.nupkg
          --repo "${{ github.repository }}"
          --title "${{ github.ref_name }}"
          --generate-notes
          ${{ contains(github.ref_name, '-') && '--prerelease' || '' }}
